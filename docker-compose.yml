version: "3.9"

services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: aeromind-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aeromind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aeromind_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aeromind}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - aeromind-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeromind"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: aeromind-redis
    ports:
      - "6379:6379"
    networks:
      - aeromind-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Backend (FastAPI) ----
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: aeromind-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aeromind:aeromind_secret@postgres:5432/aeromind
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aeromind-net
    restart: unless-stopped

  # ---- Frontend (Next.js) ----
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: aeromind-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - aeromind-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  aeromind-net:
    driver: bridge
